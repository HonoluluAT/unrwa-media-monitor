name: Weekly UNRWA Media Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Lazzarini
        run: |
          echo "Starting scan..."
          curl --version
          curl -X POST https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save\&keyword=Lazzarini -o response.txt -w "HTTP_CODE:%{http_code}" -s
          echo ""
          echo "Response:"
          cat response.txt
