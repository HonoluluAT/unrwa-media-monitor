name: Weekly UNRWA Media Scan

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for rate limit reset
        run: |
          echo "Waiting 5 minutes for rate limit to clear..."
          sleep 300

      - name: Scan Lazzarini
        run: |
          echo "Scanning Lazzarini..."
          curl -s -X POST "https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save&keyword=Lazzarini" -o /dev/null -w "HTTP %{http_code}" || true

      - name: Wait 3 minutes
        run: sleep 180

      - name: Scan UNRWA
        run: |
          echo "Scanning UNRWA..."
          curl -s -X POST "https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save&keyword=UNRWA" -o /dev/null -w "HTTP %{http_code}" || true

      - name: Wait 3 minutes
        run: sleep 180

      - name: Scan Hilfswerk
        run: |
          echo "Scanning Hilfswerk..."
          curl -s -X POST "https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save&keyword=Hilfswerk%20der%20Vereinten%20Nationen" -o /dev/null -w "HTTP %{http_code}" || true

      - name: Wait 3 minutes
        run: sleep 180

      - name: Scan UNRWA full name
        run: |
          echo "Scanning UNRWA full name..."
          curl -s -X POST "https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save&keyword=united%20nations%20relief%20and%20works%20agency%20for%20palestine%20refugees" -o /dev/null -w "HTTP %{http_code}" || true

      - name: Wait 3 minutes
        run: sleep 180

      - name: Scan UNRWA short name
        run: |
          echo "Scanning UNRWA short name..."
          curl -s -X POST "https://unrwa-media-monitor.vercel.app/api/scan?step=search-and-save&keyword=united%20nations%20relief%20and%20works%20agency" -o /dev/null -w "HTTP %{http_code}" || true

      - name: Done
        run: echo "All scans complete!"
